context:
  version: "0.4.3"

package:
  name: unpdf-rs
  version: ${{ version }}

source:
  url: https://github.com/iyulab/unpdf/archive/refs/tags/v${{ version }}.tar.gz
  sha256: acf83e781c8cdac0dbaf729b9f4e6973ffba4136cae0a335ea429d2913b66c91

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path cli
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path cli
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - if: unix
      then:
        - pkg-config
        - make
  host:
    - if: unix
      then:
        - openssl

tests:
  - script: unpdf --help
  - package_contents:
      bin:
        - unpdf

about:
  homepage: https://github.com/iyulab/unpdf
  summary: High-performance PDF content extraction to Markdown, text, and JSON
  description: |
    unpdf is a high-performance Rust library and CLI tool for extracting
    content from PDF documents to structured Markdown, plain text, and JSON.
    It supports PDF 1.0-2.0, including compressed object streams, table
    detection, image extraction, CJK text, and multiple text cleanup presets
    for LLM training data preparation.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://docs.rs/unpdf
  repository: https://github.com/iyulab/unpdf

extra:
  recipe-maintainers:
    - hadim
